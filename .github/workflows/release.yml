name: Release

# Triggered when a version tag is pushed:  git tag v0.2.0 && git push --tags
# Creates a GitHub Release with the bundled render.cjs as a downloadable asset
# and publishes the package to npm.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript + esbuild bundle)
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Extract version from tag
        id: version
        # Strip leading 'v' so we get e.g. "0.2.0" from tag "v0.2.0"
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag is already set by the push trigger
          name: "WireText v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Install

            **npm (recommended):**
            ```bash
            npm install -g wiretext
            wiretext --install-skill
            ```

            **git clone:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/wiretext/wiretext/${{ github.ref_name }}/install.sh | bash
            ```

            See [CHANGELOG.md](https://github.com/wiretext/wiretext/blob/main/CHANGELOG.md) for what's new.
          files: |
            skill/tools/render.cjs
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Tags like v1.0.0-beta.1 are marked as pre-release automatically

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
